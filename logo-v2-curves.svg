<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" font-family="Unbounded, 'Inter Tight', system-ui, sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&amp;display=swap');</style>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5E7B8"/>
      <stop offset="0.5" stop-color="#E8D5A3"/>
      <stop offset="1" stop-color="#C9A84C"/>
    </linearGradient>
    <symbol id="mark2" viewBox="0 0 110 110">
      <!-- mast -->
      <line x1="22" y1="6" x2="22" y2="100" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <!-- outer billowing sail -->
      <path d="M22 8 C 82 26, 100 64, 86 100 L22 100 Z" fill="currentColor" opacity=".26"/>
      <!-- inner gold sail -->
      <path d="M22 20 C 64 34, 80 62, 70 94 L22 94 Z" fill="url(#gold2)"/>
      <!-- wind curves -->
      <path d="M22 32 C 50 38, 62 56, 56 84" stroke="currentColor" stroke-width=".7" fill="none" opacity=".55"/>
      <path d="M22 46 C 44 52, 52 64, 48 82" stroke="currentColor" stroke-width=".5" fill="none" opacity=".4"/>
      <!-- wave -->
      <path d="M2 104 C 22 100, 34 108, 54 104 C 74 100, 86 108, 106 104" fill="none" stroke="url(#gold2)" stroke-width="1.2" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- DARK -->
  <g>
    <rect width="400" height="130" fill="#0A1628"/>
    <g color="#FFFFFF"><use href="#mark2" x="22" y="15" width="90" height="90"/></g>
    <text x="130" y="80" font-size="42" font-weight="600" fill="#FFFFFF" letter-spacing="4">Паруса</text>
    <text x="132" y="100" font-family="'JetBrains Mono', monospace" font-size="8" fill="#C9A84C" letter-spacing="2.6">DIGITAL · AI · ENGINEERING</text>
  </g>

  <line x1="0" y1="130" x2="400" y2="130" stroke="#DDE1E7" stroke-width=".5"/>

  <!-- LIGHT -->
  <g transform="translate(0,130)">
    <rect width="400" height="130" fill="#FFFFFF"/>
    <g color="#0A1628"><use href="#mark2" x="22" y="15" width="90" height="90"/></g>
    <text x="130" y="80" font-size="42" font-weight="600" fill="#0A1628" letter-spacing="4">Паруса</text>
    <text x="132" y="100" font-family="'JetBrains Mono', monospace" font-size="8" fill="#8A6323" letter-spacing="2.6">DIGITAL · AI · ENGINEERING</text>
  </g>
</svg>
